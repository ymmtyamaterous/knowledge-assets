openapi: 3.0.3
info:
  title: アセナレ API
  version: 0.1.0
servers:
  - url: http://localhost:8000
paths:
  /api/v1/auth/register:
    post:
      summary: ユーザー登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: メール重複
  /api/v1/auth/login:
    post:
      summary: ログイン
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: 認証失敗
  /api/v1/courses:
    get:
      summary: コース一覧
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  courses:
                    type: array
                    items:
                      $ref: '#/components/schemas/Course'
  /api/v1/courses/{id}:
    get:
      summary: コース詳細
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '404':
          description: Not Found
  /api/v1/users/me:
    get:
      summary: 自分のプロフィール
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
    put:
      summary: プロフィール更新
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
  /api/v1/courses/{courseID}/sections:
    get:
      summary: コース内セクション一覧
      parameters:
        - in: path
          name: courseID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  sections:
                    type: array
                    items:
                      $ref: '#/components/schemas/Section'
        '404':
          description: Not Found
  /api/v1/sections/{sectionID}/lessons:
    get:
      summary: セクション内レッスン一覧
      parameters:
        - in: path
          name: sectionID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  lessons:
                    type: array
                    items:
                      $ref: '#/components/schemas/Lesson'
        '404':
          description: Not Found
  /api/v1/lessons/{id}:
    get:
      summary: レッスン詳細
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lesson'
        '404':
          description: Not Found
  /api/v1/lessons/{id}/complete:
    post:
      summary: レッスン完了（冪等）
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLessonProgress'
        '401':
          description: Unauthorized
  /api/v1/users/me/progress:
    get:
      summary: 自分の学習進捗一覧
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  progress:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserLessonProgress'
        '401':
          description: Unauthorized
  /api/v1/glossary:
    get:
      summary: 用語辞典一覧
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  terms:
                    type: array
                    items:
                      $ref: '#/components/schemas/GlossaryTerm'
  /api/v1/glossary/{id}:
    get:
      summary: 用語詳細
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlossaryTerm'
        '404':
          description: Not Found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UpdateMeRequest:
      type: object
      properties:
        username:
          type: string
        avatarUrl:
          type: string
    Section:
      type: object
      properties:
        id:
          type: string
        courseId:
          type: string
        title:
          type: string
        description:
          type: string
        order:
          type: integer
    Lesson:
      type: object
      properties:
        id:
          type: string
        sectionId:
          type: string
        title:
          type: string
        content:
          type: string
        order:
          type: integer
    UserLessonProgress:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        lessonId:
          type: string
        completedAt:
          type: string
          format: date-time
    GlossaryTerm:
      type: object
      properties:
        id:
          type: string
        term:
          type: string
        reading:
          type: string
        definition:
          type: string
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        username:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        username:
          type: string
        avatarUrl:
          type: string
        role:
          type: string
    Course:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        difficulty:
          type: string
        estimatedHour:
          type: integer
        thumbnailUrl:
          type: string
        order:
          type: integer
