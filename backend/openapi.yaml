openapi: 3.0.3
info:
  title: アセナレ API
  version: 0.1.0
servers:
  - url: http://localhost:8000
paths:
  /api/v1/auth/register:
    post:
      summary: ユーザー登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: メール重複
  /api/v1/auth/login:
    post:
      summary: ログイン
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: 認証失敗
  /api/v1/courses:
    get:
      summary: コース一覧
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  courses:
                    type: array
                    items:
                      $ref: '#/components/schemas/Course'
  /api/v1/courses/{id}:
    get:
      summary: コース詳細
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '404':
          description: Not Found
  /api/v1/users/me:
    get:
      summary: 自分のプロフィール
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
    put:
      summary: プロフィール更新
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
  /api/v1/courses/{courseID}/sections:
    get:
      summary: コース内セクション一覧
      parameters:
        - in: path
          name: courseID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  sections:
                    type: array
                    items:
                      $ref: '#/components/schemas/Section'
        '404':
          description: Not Found
  /api/v1/sections/{sectionID}/lessons:
    get:
      summary: セクション内レッスン一覧
      parameters:
        - in: path
          name: sectionID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  lessons:
                    type: array
                    items:
                      $ref: '#/components/schemas/Lesson'
        '404':
          description: Not Found
  /api/v1/lessons/{id}:
    get:
      summary: レッスン詳細
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lesson'
        '404':
          description: Not Found
  /api/v1/lessons/{id}/complete:
    post:
      summary: レッスン完了（冪等）
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLessonProgress'
        '401':
          description: Unauthorized
  /api/v1/users/me/progress:
    get:
      summary: 自分の学習進捗一覧
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  progress:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserLessonProgress'
        '401':
          description: Unauthorized
  /api/v1/users/me/course-progress:
    get:
      summary: コース/セクション単位の進捗サマリ
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  courseProgress:
                    type: array
                    items:
                      $ref: '#/components/schemas/CourseProgress'
        '401':
          description: Unauthorized
  /api/v1/glossary:
    get:
      summary: 用語辞典一覧
      parameters:
        - in: query
          name: tagId
          schema:
            type: string
          required: false
          description: タグIDでの絞り込み
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  terms:
                    type: array
                    items:
                      $ref: '#/components/schemas/GlossaryTerm'
  /api/v1/glossary/tags:
    get:
      summary: 用語タグ一覧
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  tags:
                    type: array
                    items:
                      $ref: '#/components/schemas/GlossaryTag'
  /api/v1/glossary/{id}:
    get:
      summary: 用語詳細
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlossaryTerm'
        '404':
          description: Not Found
  /api/v1/lessons/{lessonId}/quiz:
    get:
      summary: レッスンに紐づくクイズ取得
      parameters:
        - in: path
          name: lessonId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quiz'
        '404':
          description: Not Found
  /api/v1/quizzes/{id}:
    get:
      summary: クイズ詳細（問題・選択肢）取得
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizDetailResponse'
        '404':
          description: Not Found
  /api/v1/quizzes/{id}/submit:
    post:
      summary: クイズ回答送信
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitQuizRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitQuizResponse'
        '401':
          description: Unauthorized
  /api/v1/users/me/quiz-results:
    get:
      summary: 自分のクイズ結果履歴
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserQuizResult'
        '401':
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UpdateMeRequest:
      type: object
      properties:
        username:
          type: string
        avatarUrl:
          type: string
    Section:
      type: object
      properties:
        id:
          type: string
        courseId:
          type: string
        title:
          type: string
        description:
          type: string
        order:
          type: integer
    Lesson:
      type: object
      properties:
        id:
          type: string
        sectionId:
          type: string
        title:
          type: string
        content:
          type: string
        order:
          type: integer
    UserLessonProgress:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        lessonId:
          type: string
        completedAt:
          type: string
          format: date-time
    GlossaryTerm:
      type: object
      properties:
        id:
          type: string
        term:
          type: string
        reading:
          type: string
        definition:
          type: string
        tags:
          type: array
          items:
            $ref: '#/components/schemas/GlossaryTag'
    GlossaryTag:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
    Quiz:
      type: object
      properties:
        id:
          type: string
        lessonId:
          type: string
        sectionId:
          type: string
        isMockExam:
          type: boolean
        timeLimitMinutes:
          type: integer
        createdAt:
          type: string
          format: date-time
    QuizChoice:
      type: object
      properties:
        id:
          type: string
        questionId:
          type: string
        choiceText:
          type: string
        isCorrect:
          type: boolean
    QuizQuestion:
      type: object
      properties:
        id:
          type: string
        quizId:
          type: string
        questionText:
          type: string
        explanation:
          type: string
        order:
          type: integer
        choices:
          type: array
          items:
            $ref: '#/components/schemas/QuizChoice'
    QuizDetailResponse:
      type: object
      properties:
        quiz:
          $ref: '#/components/schemas/Quiz'
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuizQuestion'
    SubmitQuizAnswer:
      type: object
      required: [questionId, choiceId]
      properties:
        questionId:
          type: string
        choiceId:
          type: string
    SubmitQuizRequest:
      type: object
      required: [answers]
      properties:
        answers:
          type: array
          items:
            $ref: '#/components/schemas/SubmitQuizAnswer'
    UserQuizResult:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        quizId:
          type: string
        score:
          type: integer
        total:
          type: integer
        takenAt:
          type: string
          format: date-time
    SubmitQuizResponse:
      type: object
      properties:
        result:
          $ref: '#/components/schemas/UserQuizResult'
        correct:
          type: object
          additionalProperties:
            type: boolean
    SectionProgress:
      type: object
      properties:
        sectionId:
          type: string
        sectionTitle:
          type: string
        totalLessons:
          type: integer
        completedLessons:
          type: integer
        progressRate:
          type: integer
    CourseProgress:
      type: object
      properties:
        courseId:
          type: string
        courseTitle:
          type: string
        totalLessons:
          type: integer
        completedLessons:
          type: integer
        progressRate:
          type: integer
        sections:
          type: array
          items:
            $ref: '#/components/schemas/SectionProgress'
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        username:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        username:
          type: string
        avatarUrl:
          type: string
        role:
          type: string
    Course:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        difficulty:
          type: string
        estimatedHour:
          type: integer
        thumbnailUrl:
          type: string
        order:
          type: integer
